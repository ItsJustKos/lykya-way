<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё путешествие — Ликийская тропа</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0,0,0,0.5);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      margin: 0 15px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      padding-top: 120px;

      /* градиент + картинка */
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.2)),
        url('hero.heic') center/cover no-repeat;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: #fff;
      text-shadow: 
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.9;
    }

    .section {
      padding: 60px 40px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #38bdf8;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      font-size: 14px;
      opacity: 0.7;
    }

    /* 📱 МОБИЛЬНАЯ АДАПТАЦИЯ */
    @media (max-width: 768px) {
      header {
        padding: 15px 20px;
      }

      nav a {
        margin: 0 8px;
        font-size: 14px;
      }

      .hero {
        height: auto;
        padding: 80px 20px;

        background:
          linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.2)),
          url('hero.jpg') center/contain no-repeat;
        background-color: #0f172a;
      }

      .hero h1 {
        font-size: 32px;
      }

      .hero p {
        font-size: 16px;
      }

      .section {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>

<header>
  <div>Моё путешествие</div>
  <nav>
    <a href="#lykia">Ликийская тропа</a>
    <a href="#kas">Каш</a>
    <a href="#contact">Связаться</a>
  </nav>
</header>

<section class="hero">
  <h1>Ликийская тропа</h1>
  <p>Путешествие, которое изменило меня</p>
  <a class="btn" href="#lykia">Смотреть фото</a>
</section>

<section id="lykia" class="section">
  <h2>Ликийская тропа</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" />
    <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" />
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" />
  </div>
</section>

<section id="kas" class="section">
  <h2>Каш</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" />
    <img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98" />
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" />
  </div>
</section>

<section id="contact" class="section">
  <h2>Связаться</h2>
  <p>Напиши мне в Telegram</p>
  <a class="btn" href="https://t.me/itsjustkos" target="_blank">Написать в Telegram</a>
</section>

<footer>
  © 2026 Kos production
</footer>

</body>
</html>
